---
apiVersion: v1
kind: ConfigMap
metadata:
  name: guardrails-maas-proxy-config
data:
  nginx.conf: |
    worker_processes 1;
    error_log /dev/stderr debug;
    pid /tmp/nginx.pid;
    events { worker_connections 128; }
    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      log_format debug_log '$remote_addr - $request_uri - $status - body: $request_body';
      access_log /dev/stdout debug_log;
      resolver 172.30.0.10 valid=30s;
      # HTTP->HTTPS proxy for MaaS LLM endpoint
      server {
        listen 8081;
        location / {
          set $upstream https://maas.apps.ocp.cloud.rhai-tmm.dev;
          rewrite ^/v1/(.*)$ /prelude-maas/llama-4-scout-17b-16e-w4a16/v1/$1 break;
          rewrite ^/tokenize$ /prelude-maas/llama-4-scout-17b-16e-w4a16/tokenize break;
          proxy_pass $upstream;
          proxy_http_version 1.1;
          proxy_ssl_server_name on;
          proxy_ssl_name maas.apps.ocp.cloud.rhai-tmm.dev;
          proxy_ssl_protocols TLSv1.2 TLSv1.3;
          proxy_set_header Host maas.apps.ocp.cloud.rhai-tmm.dev;
          proxy_set_header Connection "";
          proxy_read_timeout 120s;
          proxy_connect_timeout 10s;
          proxy_buffering off;
        }
      }
      # HTTP->HTTPS proxy for orchestrator (TLS termination + path rewrite)
      # Rewrites OpenAI-compatible /v1/chat/completions to orchestrator's
      # /api/v2/chat/completions-detection endpoint so the backend can call
      # the orchestrator directly with detectors in extra_body.
      server {
        listen 8033;
        location / {
          set $orch https://guardrails-orchestrator-service.voice-agents.svc.cluster.local:8032;
          rewrite ^/v1/chat/completions$ /api/v2/chat/completions-detection break;
          proxy_pass $orch;
          proxy_http_version 1.1;
          proxy_ssl_server_name on;
          proxy_ssl_protocols TLSv1.2 TLSv1.3;
          proxy_ssl_verify off;
          proxy_set_header Host guardrails-orchestrator-service;
          proxy_set_header Connection "";
          proxy_read_timeout 120s;
          proxy_connect_timeout 10s;
          proxy_buffering off;
        }
      }
    }
