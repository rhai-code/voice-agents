{{- if .Values.mlflow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-voice-agent.fullname" . }}-mlflow
  labels:
    {{- include "ai-voice-agent.mlflow.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mlflow.replicas }}
  selector:
    matchLabels:
      {{- include "ai-voice-agent.mlflow.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-voice-agent.mlflow.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mlflow.port }}
              protocol: TCP
          {{- if .Values.mlflow.args }}
          args:
            {{- toYaml .Values.mlflow.args | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /mlflow
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ai-voice-agent.fullname" . }}-mlflow
{{- end }}
