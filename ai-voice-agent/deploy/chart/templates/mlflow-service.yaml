{{- if .Values.mlflow.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-voice-agent.fullname" . }}-mlflow
  labels:
    {{- include "ai-voice-agent.mlflow.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.mlflow.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ai-voice-agent.mlflow.selectorLabels" . | nindent 4 }}
{{- end }}
